<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credit Auto Sales - Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #1e40af;
      --secondary-color: #0f172a;
      --accent-color: #3b82f6;
      --border-color: #e5e7eb;
      --text-color: #1f2937;
      --light-bg: #f9fafb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: white;
      color: var(--text-color);
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-height: 100vh;
    }

    .chat-header {
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .chat-header h1 {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .chat-header p {
      font-size: 13px;
      opacity: 0.9;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: var(--light-bg);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      margin-bottom: 12px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
    }

    .message.user .message-content {
      background: var(--primary-color);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.bot .message-content {
      background: white;
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-bottom-left-radius: 4px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      width: fit-content;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #999;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.7; }
      30% { transform: translateY(-10px); opacity: 1; }
    }

    .chat-input-area {
      border-top: 1px solid var(--border-color);
      padding: 16px;
      background: white;
      display: flex;
      gap: 8px;
    }

    .input-group {
      display: flex;
      gap: 8px;
      flex: 1;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent-color);
    }

    button {
      padding: 12px 16px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    button:hover {
      background: var(--secondary-color);
    }

    button:active {
      transform: scale(0.98);
    }

    .info-panel {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      margin: 4px 0;
      font-size: 13px;
      color: #666;
    }

    .form-section {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
      margin: 8px 0;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px;
      color: var(--text-color);
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    @media (max-width: 640px) {
      .chat-header h1 {
        font-size: 18px;
      }

      .message-content {
        max-width: 90%;
      }

      .chat-input-area {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>Credit Auto Sales</h1>
      <p>Chat with us about vehicles and test drives</p>
    </div>

    <div class="chat-messages" id="messages">
      <!-- Messages will appear here -->
    </div>

    <div class="chat-input-area">
      <div class="input-group">
        <input
          type="text"
          id="messageInput"
          placeholder="Tell us what you're looking for..."
          autocomplete="off"
        >
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin + '/api';
    let sessionId = null;
    let conversationHistory = [];

    // Initialize
    async function init() {
      sessionId = 'session_' + Date.now();
      await addBotMessage('Welcome to Credit Auto Sales! 👋 I\'m here to help you find the perfect vehicle. What are you looking for today?');
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();

      if (!message) return;

      input.value = '';
      addUserMessage(message);
      fetchBotResponse(message);
    }

    function addUserMessage(text) {
      const messagesDiv = document.getElementById('messages');
      const messageEl = document.createElement('div');
      messageEl.className = 'message user';
      messageEl.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
      messagesDiv.appendChild(messageEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function addBotMessage(text) {
      const messagesDiv = document.getElementById('messages');
      const messageEl = document.createElement('div');
      messageEl.className = 'message bot';
      messageEl.innerHTML = `<div class="message-content">${escapeHtml(text)}</div>`;
      messagesDiv.appendChild(messageEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTyping() {
      const messagesDiv = document.getElementById('messages');
      const typingEl = document.createElement('div');
      typingEl.className = 'message bot';
      typingEl.id = 'typing-indicator';
      typingEl.innerHTML = `<div class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
      messagesDiv.appendChild(typingEl);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeTyping() {
      const typingEl = document.getElementById('typing-indicator');
      if (typingEl) typingEl.remove();
    }

    async function fetchBotResponse(message) {
      showTyping();
      try {
        const response = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, sessionId })
        });

        const data = await response.json();
        removeTyping();

        if (data.response) {
          await addBotMessage(data.response);
          conversationHistory.push({ user: message, bot: data.response });
        } else {
          await addBotMessage('Sorry, I had trouble processing that. Please try again.');
        }
      } catch (error) {
        removeTyping();
        await addBotMessage('Connection error. Please check your internet and try again.');
      }
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Enter to send
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Start
    init();
  </script>
</body>
</html>
